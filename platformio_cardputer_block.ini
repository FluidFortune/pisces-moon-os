; ============================================================
;  platformio_cardputer_block.ini
;
;  Drop-in replacement for the [env:cardputer_adv] stub block
;  in your existing platformio.ini (currently lines 167–184).
;
;  TO APPLY:
;    Delete the existing stub block from your platformio.ini
;    starting at the "; ── CARDPUTER ADV ───..." separator
;    through the end of the file. Paste this block in its place.
;
;  WHAT THIS DOES NOT TOUCH:
;    - [platformio] section
;    - [common] section
;    - [env:tdeck_plus] block
;    - [env:tlorapager] block
;  All three are byte-identical to your current working file.
;
; ============================================================


; ── CARDPUTER ADV ─────────────────────────────────────────
; Source: docs.m5stack.com/en/core/Cardputer-Adv (PinMap section)
;         docs.m5stack.com/en/cap/Cap_LoRa868 (header pinout)
;         Stamp-S3A v0.3.3 schematic
;
; HARDWARE NOTES (read before changing pins):
;
;   1. SX1262 LoRa cap and microSD share the SAME SPI bus.
;      Both use SCK=G40, MOSI=G14, MISO=G39. Different CS pins
;      (SD=G12, LoRa=G5) but the bus itself is one wire.
;      The SPI Bus Treaty (spi_treaty.h) is MANDATORY here —
;      same enforcement as T-Deck Plus, identical code path.
;
;   2. The Cardputer ADV ships with the Stamp-S3A core which
;      is ESP32-S3FN8 — 8MB flash, NOT 16MB. Custom partition
;      table required (partitions_cardputer.csv).
;
;   3. PSRAM on Stamp-S3A is octal PSRAM (8MB). Use qio_opi
;      memory_type, matching T-Deck Plus.
;
;   4. The 56-key keyboard runs through a TCA8418 I/O expander
;      at I2C 0x34 — identical chip to T-LoraPager. The Pager
;      keyboard driver path is reused. I2C bus is shared with
;      the ES8311 audio codec (0x18) and BMI270 IMU (0x68).
;
;   5. NO trackball, NO rotary encoder. Navigation is
;      keyboard-only. The launcher is single-row side-scrolling
;      (DEVICE_CARDPUTER_ADV-specific layout).
;
;   6. The runtime detects whether the LoRa+GPS cap is plugged
;      in by probing the SX1262 over SPI at boot. No build-time
;      conditional — same firmware works with or without cap.
;
;   7. Games EXCLUDED from Cardputer build (display too small at
;      240x135 for their game canvas): DOOM, SIMCITY. Compiled
;      out via #ifndef DEVICE_CARDPUTER_ADV in launcher.cpp.
;
[env:cardputer_adv]
extends = common

; Override flash size from common (16MB → 8MB).
; Stamp-S3A is ESP32-S3FN8: 8MB flash, octal PSRAM.
board_upload.flash_size   = 8MB
board_upload.maximum_size = 8388608
board_build.partitions    = partitions_cardputer.csv

lib_deps =
    ${common.lib_deps}
    moononournation/GFX Library for Arduino @ 1.4.7

; Serial monitor — match T-Deck Plus baud (115200) for
; consistency. Stamp-S3A USB-CDC is the boot console.
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, time

; macOS CDC upload fix — no DTR/RTS toggle on native USB.
; Same approach as T-Deck Plus, the Stamp-S3A also boots
; through native USB CDC and the reset toggle confuses the
; bootloader.
upload_resetmethod = no_reset
upload_flags =
    --before=default_reset
    --after=hard_reset

; PSRAM memory type for Stamp-S3A hardware (octal PSRAM).
; Same as T-Deck Plus. T-LoraPager uses qio_qspi because of
; its different PSRAM/SPI pin overlap; that does not apply
; here. The Cardputer ADV uses SPI on G40/G14/G39 which is
; outside the OPI range, identical to T-Deck Plus.
board_build.arduino.memory_type = qio_opi

build_flags =
    ${common.build_flags_common}
    -DDEVICE_CARDPUTER_ADV
    -DARDUINO_M5STACK_CARDPUTER_ADV  ; matches M5Stack identifier
    -I variants/m5stack_cardputer_adv ; pins_arduino.h with correct
                                      ; SS/MOSI/MISO/SCK for shared
                                      ; SD + LoRa cap SPI bus
    ; ─────────────────────────────────────────────────────
    ;  WiFi minimum-RAM config (no-PSRAM constraint)
    ;
    ;  Default Arduino-ESP32 WiFi config assumes ~80KB of contiguous
    ;  internal SRAM is available for RX/TX descriptor pools and
    ;  AMPDU aggregation buffers. On Cardputer with only 320KB of
    ;  internal SRAM, after FreeRTOS + display + NimBLE + LoRa eat
    ;  their share, the default config fails with:
    ;    "Expected to init N rx buffer, actual is M" (M < N)
    ;  followed by complete WiFi init failure.
    ;
    ;  These overrides use the documented Espressif "minimum config"
    ;  rank from the ESP-IDF WiFi tuning guide. Trade-off: no AMPDU
    ;  aggregation = lower throughput. We only scan, not stream, so
    ;  that's a non-issue. Without these, WiFi simply doesn't start.
    -DCONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM=4
    -DCONFIG_ESP_WIFI_DYNAMIC_RX_BUFFER_NUM=8
    -DCONFIG_ESP_WIFI_DYNAMIC_TX_BUFFER_NUM=8
    -DCONFIG_ESP_WIFI_AMPDU_RX_ENABLED=0
    -DCONFIG_ESP_WIFI_AMPDU_TX_ENABLED=0
    -DCONFIG_ESP_WIFI_NVS_ENABLED=0
    -DCONFIG_ESP_WIFI_RX_BA_WIN=2
    ; ─────────────────────────────────────────────────────
    ;  NimBLE minimal-role config (no-PSRAM constraint)
    ;
    ;  Wardrive is a PASSIVE OBSERVER — it scans for BLE advertisements,
    ;  never initiates connections, never advertises itself, never bonds.
    ;  Default NimBLE config initializes state machines and buffer pools
    ;  for ALL four BLE roles (Observer, Central, Peripheral, Broadcaster)
    ;  even when only Observer is used. On a 320KB no-PSRAM device with
    ;  ~50KB free heap at BLE init time, the full default allocation
    ;  consumes 48KB and leaves <3KB free — well below the runtime
    ;  headroom required to safely construct NimBLEAdvertisedDevice
    ;  objects when ads arrive. Result: std::terminate() in operator new
    ;  on the next incoming advertisement.
    ;
    ;  These flags strip NimBLE down to Observer-only, dropping its
    ;  footprint from 48KB to ~25-30KB. Combined with WiFi tuning above,
    ;  this leaves 15-25KB of runtime headroom — enough to keep BLE
    ;  scanning healthy throughout a wardrive session.
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=0
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=0
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER=0
    -DCONFIG_BT_NIMBLE_MAX_BONDS=0
    -DCONFIG_BT_NIMBLE_MSYS1_BLOCK_COUNT=12
    -DCONFIG_BT_NIMBLE_LOG_LEVEL=4
    ; ─────────────────────────────────────────────────────
    ;  WiFi/BLE coexistence layer DISABLED
    ;
    ;  The ESP-IDF software coex layer (CONFIG_SW_COEXIST_ENABLE=1 by
    ;  default) coordinates WiFi and BLE radio time-slicing automatically.
    ;  It works fine when there's PSRAM and plenty of internal SRAM.
    ;
    ;  On the Cardputer's tight memory budget, the coex layer ITSELF
    ;  allocates ~5-10KB at WiFi/BLE init and — more critically —
    ;  tries to re-allocate WiFi RX descriptor pools at BLE init time
    ;  to make room for BLE's radio slots. That re-allocation hits a
    ;  fragmented heap and contributes to the OOM.
    ;
    ;  Disabling coex means wardrive_task is responsible for time-slicing
    ;  WiFi and BLE manually. We already do this: alternating every 2
    ;  seconds between WiFi scan and BLE scan windows (see wardrive.cpp
    ;  v2.11 "Radio toggle 2s" changelog entry), never running both
    ;  concurrently. The hardware coexistence work the coex layer
    ;  would do is unnecessary because the radios are never concurrent.
    -DCONFIG_SW_COEXIST_ENABLE=0
    ; ─────────────────────────────────────────────────────
    ; Display pins (ST7789V2 240x135, landscape)
    -DPIN_LCD_BL=38
    -DPIN_LCD_RST=33
    -DPIN_LCD_DC=34
    -DPIN_LCD_MOSI=35
    -DPIN_LCD_SCK=36
    -DPIN_LCD_CS=37
    ; Shared SPI bus (SD + LoRa cap)
    -DPIN_SPI_MOSI=14
    -DPIN_SPI_MISO=39
    -DPIN_SPI_SCK=40
    -DPIN_SD_CS=12
    ; LoRa cap (Cap LoRa868 form factor on EXT 2.54-14P)
    -DPIN_LORA_CS=5
    -DPIN_LORA_RST=3
    -DPIN_LORA_IRQ=4
    -DPIN_LORA_BUSY=6
    ; GPS UART (cap-routed, ATGM336H/AT6668 family)
    ; Naming is ESP32-perspective, matching the convention used
    ; in wardrive.cpp's SerialGPS.begin(baud, config, RX, TX).
    ; Cardputer EXT header labels G13=UART_RX, G15=UART_TX from
    ; the CAP'S perspective. From the ESP32's perspective those
    ; labels INVERT: cap GPS-RX (chip wants writes) lands on G13,
    ; cap GPS-TX (chip sends NMEA) lands on G15. So:
    ;   ESP32 TX (writes commands to GPS) = G13
    ;   ESP32 RX (reads NMEA from GPS)    = G15
    -DPIN_GPS_TX=13        ; ESP32 TX → cap GPS-RX
    -DPIN_GPS_RX=15        ; ESP32 RX ← cap GPS-TX
    ; I2C bus (codec + IMU + keyboard chip)
    -DPIN_I2C_SDA=8
    -DPIN_I2C_SCL=9
    ; Keyboard interrupt (TCA8418 KEY_INT)
    -DPIN_KEY_INT=11
    ; ES8311 I2S audio
    -DPIN_I2S_SCLK=41
    -DPIN_I2S_DOUT=46
    -DPIN_I2S_LRCK=43
    -DPIN_I2S_DIN=42
    ; IR transmitter
    -DPIN_IR_TX=44
    ; Battery ADC
    -DPIN_BAT_ADC=10
    ; Boot button (Cardputer's G0 button — also used for
    ; "exit to launcher" alternate)
    -DPIN_BOOT_BTN=0