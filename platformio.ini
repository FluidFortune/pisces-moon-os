; ============================================================
;  platformio.ini — Multi-device build configuration
;
;  Targets:
;    tdeck_plus      LilyGO T-Deck Plus (ESP32-S3) — primary
;    tlorapager      LilyGO T-LoraPager (ESP32-S3) — v1.1.x port
;    cardputer_adv   M5Stack Cardputer ADV (ESP32-S3) — pending
;
;  Usage:
;    VS Code: select environment in PlatformIO toolbar (bottom)
;    CLI:     pio run -e tdeck_plus --target upload
;             pio run -e tlorapager --target upload
;             pio run -e cardputer_adv --target upload
; ============================================================

[platformio]
default_envs = tdeck_plus

; ── Shared settings — common to all S3 devices ───────────
[common]
platform  = espressif32 @ 6.7.0
board     = esp32-s3-devkitc-1
framework = arduino

upload_speed  = 921600

board_upload.flash_size   = 16MB
board_upload.maximum_size = 16777216
board_build.partitions    = partitions.csv

; Shared lib_deps — all devices use these
lib_deps =
    lewisxhe/XPowersLib @ 0.2.1
    tamctec/TAMC_GT911 @ 1.0.2
    greiman/SdFat @ 2.2.3
    mikalhart/TinyGPSPlus @ 1.0.3
    bblanchon/ArduinoJson @ 7.4.3
    h2zero/NimBLE-Arduino @ 1.4.1
    esphome/ESP32-audioI2S @ 2.1.0
    https://github.com/tzapu/WiFiManager.git
    jgromes/RadioLib @ ^6.4.0

; Shared build flags — common to all S3 devices.
; Keep PSRAM-specific switches out of this base block: Cardputer ADV is
; ESP32-S3FN8 / 8MB flash with no PSRAM, and paying PSRAM compile flags
; there obscures the real internal-DRAM budget.
build_flags_common =
    -I include
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -fPIC
    -Os
    -DPISCES_ELF_API_MAJOR=1
    -DPISCES_ELF_API_MINOR=0
    -DPISCES_OS_VERSION=\"1.2.0\"

; PSRAM-only switches. Include this block only on boards that physically
; have PSRAM (T-Deck Plus and T-LoRa Pager).
build_flags_psram =
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_USE_MALLOC=1
    -mfix-esp32-psram-cache-issue


; ── T-DECK PLUS ──────────────────────────────────────────
; Exact match to current working platformio.ini
; Only addition: -DDEVICE_TDECK_PLUS for HAL selection
[env:tdeck_plus]
extends = common

lib_deps =
    ${common.lib_deps}
    moononournation/GFX Library for Arduino @ 1.4.7

; Serial monitor
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, time

; macOS CDC upload fix — no DTR/RTS toggle on native USB
upload_resetmethod = no_reset
upload_flags =
    --before=default_reset
    --after=hard_reset

; PSRAM memory type for T-Deck Plus hardware
board_build.arduino.memory_type = qio_opi

build_flags =
    ${common.build_flags_common}
    ${common.build_flags_psram}
    -DDEVICE_TDECK_PLUS


; ── T-LORA PAGER ─────────────────────────────────────────
; Source: T-LoraPager V1.0 SCH 25-06-13.pdf
;         LilyGoLib official wiki hardware reference
;         LilyGoLib-PlatformIO/platformio.ini (canonical config)
; No LilyGoLib dependency — direct hardware access
[env:tlorapager]
extends = common

; ⚠ PLATFORM OVERRIDE — T-LoraPager only.
;   T-Deck Plus is on espressif32@6.7.0 (Arduino-ESP32 2.0.16) and works
;   fine. T-LoraPager's SPI stack has SD-mount issues on 2.0.16 that are
;   fixed in 2.0.17 (LilyGo's known-working version). We pin to 6.10.0
;   ONLY for this env to inherit those fixes without disturbing T-Deck.
platform = espressif32 @ 6.10.0

monitor_speed   = 921600
monitor_filters = esp32_exception_decoder, time

; ⚠ ARDUINO VARIANT — Pisces Moon ships LilyGo's exact variant header in
;   variants/lilygo_tlora_pager/ and includes it via -I in build_flags below.
;   We do NOT use board_build.arduino.variant — that mechanism requires the
;   variant to exist in the Arduino-ESP32 core, which it doesn't until
;   core v3.3.0. We are on espressif32@6.7.0 which bundles core 2.0.16.
;   The -I approach matches LilyGo's official platformio.ini exactly.
;
; ⚠ HARDWARE NOTE: T-LoraPager routes SPI on GPIO 33/34/35, which overlap
;   the ESP32-S3 Octal PSRAM pin range. qio_qspi puts PSRAM on the Quad
;   bus, freeing 33/34/35 for SPI use. (T-Deck Plus stays on qio_opi
;   because its SPI uses 38/40/41 — outside the OPI range.)
board_build.arduino.memory_type = qio_qspi

build_flags =
    ${common.build_flags_common}
    ${common.build_flags_psram}
    -DDEVICE_TLORAPAGER
    -DARDUINO_T_LORA_PAGER       ; matches LilyGo's identifier — required by
                                 ; LilyGoLib.h's board-detection guards even
                                 ; though we don't use LilyGoLib itself
    -I variants/lilygo_tlora_pager  ; pins_arduino.h with correct SS/MOSI/MISO/SCK
    ; Pin assignments — confirmed from schematic + wiki
    -DPIN_SPI_MOSI=34
    -DPIN_SPI_MISO=33
    -DPIN_SPI_SCK=35
    -DPIN_LCD_CS=38
    -DPIN_LCD_DC=37
    -DPIN_LCD_BL=42
    -DPIN_KB_BL=46
    -DPIN_LORA_CS=36
    -DPIN_LORA_IRQ=14
    -DPIN_LORA_RST=47
    -DPIN_LORA_BUSY=48
    -DPIN_SD_CS=21
    -DPIN_NFC_CS=39
    -DPIN_NFC_IRQ=5
    -DPIN_GPS_TX=4
    -DPIN_GPS_RX=12
    -DPIN_GPS_PPS=13
    -DPIN_I2C_SDA=3
    -DPIN_I2C_SCL=2
    -DPIN_RTC_INT=1
    -DPIN_ENCODER_A=40
    -DPIN_ENCODER_B=41
    -DPIN_ENCODER_BTN=7
    -DPIN_KEY_INT=6
    -DPIN_IMU_HIRQ=8
    -DPIN_I2S_MCLK=10
    -DPIN_I2S_SCLK=11
    -DPIN_I2S_DOUT=45
    -DPIN_I2S_DIN=17
    -DPIN_I2S_LRCK=18
    -DPIN_NRF24_CE=43
    -DPIN_NRF24_CS=44
    -DPIN_BOOT_BTN=0


; ── CARDPUTER ADV ─────────────────────────────────────────
; Source: docs.m5stack.com/en/core/Cardputer-Adv (PinMap section)
;         docs.m5stack.com/en/cap/Cap_LoRa868 (header pinout)
[env:cardputer_adv]
extends = common

; Cardputer ADV target is ESP32-S3FN8 class: 8MB flash, no PSRAM.
board_upload.flash_size   = 8MB
board_upload.maximum_size = 8388608
board_build.partitions    = partitions_cardputer.csv

lib_deps =
    ${common.lib_deps}
    moononournation/GFX Library for Arduino @ 1.4.7
    ; M5Cardputer keyboard driver — wraps TCA8418 matrix scan
    ; and provides Fn-modifier resolution. v1.1.1 specifically:
    ; 1.1.0 has a known bug where z/c/b/m return lowercase even
    ; when shift is held. M5Unified is M5Cardputer's transitive
    ; dependency but pinning it here documents the requirement.
    m5stack/M5Cardputer @ ^1.1.1
    m5stack/M5Unified @ ^0.2.8

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, time

upload_resetmethod = no_reset
upload_flags =
    --before=default_reset
    --after=hard_reset

build_flags =
    ${common.build_flags_common}
    -DDEVICE_CARDPUTER_ADV
    -DDEVICE_NO_PSRAM
    -DARDUINO_M5STACK_CARDPUTER_ADV
    -I variants/m5stack_cardputer_adv
    ; ─────────────────────────────────────────────────────
    ;  HISTORICAL NOTE — CONFIG_* SDK flags removed in v1.2
    ;
    ;  Earlier v1.2 development attempted to inject ESP-IDF sdkconfig
    ;  overrides (CONFIG_BT_NIMBLE_*, CONFIG_ESP_WIFI_*, CONFIG_SW_
    ;  COEXIST_ENABLE) via -D build_flags here to shrink NimBLE and
    ;  tune WiFi for the no-PSRAM Cardputer.
    ;
    ;  This DOES NOT WORK with Arduino-ESP32. The framework links
    ;  against pre-compiled libraries (libbt.a, libwifi.a) built with
    ;  the sdkconfig defaults baked in at library compile time. The
    ;  -D flags only reach project-built libraries (like NimBLE-
    ;  Arduino, which gets compiled fresh in .pio/libdeps/).
    ;
    ;  Result: NimBLE-Arduino was being compiled with reduced buffer
    ;  counts, but the underlying ESP-IDF Bluetooth controller was
    ;  still expecting defaults. The mismatch caused NimBLEDevice::
    ;  init() to hang indefinitely waiting for buffer pools the
    ;  controller wouldn't provide, triggering the task watchdog at
    ;  5 seconds.
    ;
    ;  Tuning NimBLE on Cardputer requires a real sdkconfig override
    ;  (custom ESP-IDF build or sdkconfig.defaults via a recent
    ;  Arduino-ESP32 framework version). Both are larger changes than
    ;  v1.2 can absorb. v1.3 may revisit.
    ;
    ;  For now, the no-PSRAM constraint is handled architecturally
    ;  instead: WiFi mode-locking (g_wifi_mode in wifi_mode.cpp)
    ;  enforces wardrive vs WiFi-client as mutually exclusive, and
    ;  lazy boot init (no autoconnect, no Gemini at startup) recovers
    ;  ~30-50KB of headroom for whichever mode the user selects.
    ; ─────────────────────────────────────────────────────
    ; Display pins (ST7789V2 240x135, landscape)
    -DPIN_LCD_BL=38
    -DPIN_LCD_RST=33
    -DPIN_LCD_DC=34
    -DPIN_LCD_MOSI=35
    -DPIN_LCD_SCK=36
    -DPIN_LCD_CS=37
    ; Shared SPI bus (SD + LoRa cap)
    -DPIN_SPI_MOSI=14
    -DPIN_SPI_MISO=39
    -DPIN_SPI_SCK=40
    -DPIN_SD_CS=12
    ; LoRa cap
    -DPIN_LORA_CS=5
    -DPIN_LORA_RST=3
    -DPIN_LORA_IRQ=4
    -DPIN_LORA_BUSY=6
    ; GPS UART
    -DPIN_GPS_TX=13
    -DPIN_GPS_RX=15
    ; I2C bus (codec + IMU + keyboard)
    -DPIN_I2C_SDA=8
    -DPIN_I2C_SCL=9
    -DPIN_KEY_INT=11
    ; ES8311 I2S audio
    -DPIN_I2S_SCLK=41
    -DPIN_I2S_DOUT=46
    -DPIN_I2S_LRCK=43
    -DPIN_I2S_DIN=42
    ; IR + battery + boot
    -DPIN_IR_TX=44
    -DPIN_BAT_ADC=10
    -DPIN_BOOT_BTN=0
