[env:esp32s3]
platform = espressif32 @ 6.7.0
board = esp32-s3-devkitc-1
framework = arduino

; Serial Monitor Settings
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

; Upload speed — slower fixes "No serial data received" on T-Deck Plus
upload_speed = 115200

; Native USB CDC upload fix for ESP32-S3 on macOS.
; The chip has no dedicated USB-serial bridge — after the stub runs, the port
; re-enumerates and macOS needs a moment before esptool can talk to it.
; no_reset skips the DTR/RTS toggle (meaningless on CDC), and the explicit
; --before/--after flags give esptool the correct reset sequencing.
upload_resetmethod = no_reset
upload_flags =
    --before=default_reset
    --after=hard_reset

; --- MEMORY CONFIGURATION ---
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions.csv

; --- BUILD FLAGS ---
; PSRAM HEAP REDIRECT:
; CONFIG_SPIRAM_USE_MALLOC redirects malloc()/new/String heap allocations
; above the threshold to PSRAM automatically. Internal SRAM is reserved
; for ISR-critical buffers, task stacks, and the Arduino core.
; This prevents heap fragmentation in SRAM during high-density WiFi/BLE
; scans without requiring manual ps_malloc() calls throughout the codebase.
;
; ELF EXECUTION FLAGS:
; -fPIC: Position Independent Code — required for ELF modules loaded into
;        arbitrary PSRAM addresses at runtime.
; -mfix-esp32-psram-cache-issue: Required for code executing from PSRAM on
;        ESP32-S3. Prevents cache coherency issues when PSRAM-resident code
;        accesses internal SRAM data.
; IRAM_ATTR is not usable for ELF-loaded code. All ELF module functions
; execute from PSRAM by definition.
build_flags = 
    -I include
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_SPIRAM_USE_MALLOC=1
    -fPIC
    -mfix-esp32-psram-cache-issue
    -Os
    ; ELF Engine version tag
    -DPISCES_ELF_API_MAJOR=1
    -DPISCES_ELF_API_MINOR=0
    -DPISCES_OS_VERSION=\"1.0.0\"

lib_deps =
    moononournation/GFX Library for Arduino @ 1.4.7
    lewisxhe/XPowersLib @ 0.2.1
    tamctec/TAMC_GT911 @ 1.0.2
    greiman/SdFat @ 2.2.3
    mikalhart/TinyGPSPlus @ 1.0.3
    bblanchon/ArduinoJson @ 7.4.3
    h2zero/NimBLE-Arduino @ 1.4.1
    esphome/ESP32-audioI2S @ 2.1.0
    https://github.com/tzapu/WiFiManager.git
    jgromes/RadioLib @ ^6.4.0
    ; NOTE: Bluepad32 (lemmingdev/ESP32-BLE-Gamepad or bluepad32/bluepad32)
    ; is an alternative to the custom gamepad.h BLE HID implementation.
    ; If NimBLE HID client connection proves unreliable with Zero 2,
    ; add Bluepad32 here and replace gamepad.h with its abstraction layer.
    ; Bluepad32 handles Classic BT + BLE HID and works with 8BitDo natively.
    ; lemmingdev/ESP32-BLE-Gamepad @ ^0.5.4